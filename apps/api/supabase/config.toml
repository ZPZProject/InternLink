project_id = "InternLink"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 100

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000", "http://localhost:54321/auth/v1/callback"]
jwt_expiry = 36000
enable_anonymous_sign_ins = true

[db]
port = 54322

[studio]
port = 54323

[analytics]
enabled = false
port = 54327
vector_port = 54328
backend = "postgres"

[db.seed]
sql_paths = ["seeds/*.sql"]
# Custom Access Token hook: adds user_role + is_active JWT claims from public.profiles
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"
